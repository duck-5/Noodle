<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TauTracker - Tel Aviv University Moodle Replacement User Interface and Course Tracker">
  <title>TauTracker — Moodle Redefined</title>
  
  <!-- Typography (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Design System -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  
  <!-- App Container (Hash Router Target) -->
  <div id="app" class="auth-mode">
    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:16px;">
      <svg class="spin" style="width: 48px; height: 48px; color: var(--primary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <div style="font-weight:600; color:var(--text-secondary);">Loading TauTracker...</div>
    </div>
  </div>

  <!-- Entry Script (ES Modules) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
